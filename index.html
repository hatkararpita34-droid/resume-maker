<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Resume Builder</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- html2pdf for generating PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* Tailwind gray-100 */
        }
        
        /* Custom scrollbar for better look */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }

        /* Resume Preview specific styles to ensure consistency when printing */
        #resume-preview-container {
            background: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            /* A4 aspect ratio approximation for screen */
            min-height: 297mm;
            width: 100%;
            max-width: 210mm;
            margin: 0 auto;
        }

        /* Ensure clean printing */
        @media print {
            body * {
                visibility: hidden;
            }
            #resume-preview-container, #resume-preview-container * {
                visibility: visible;
            }
            #resume-preview-container {
                position: absolute;
                left: 0;
                top: 0;
                box-shadow: none;
                width: 100%;
                max-width: none;
            }
        }
    </style>
</head>
<body class="text-gray-800 h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-indigo-600 text-white shadow-md p-4 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i data-lucide="file-text" class="w-6 h-6"></i>
                <h1 class="text-xl font-bold tracking-tight">ProResume Builder</h1>
            </div>
            <div class="flex gap-3">
                <button onclick="loadSampleData()" class="px-4 py-2 bg-indigo-500 hover:bg-indigo-400 rounded-md text-sm font-medium transition-colors hidden sm:block">
                    Load Sample
                </button>
                <button onclick="clearForm()" class="px-4 py-2 border border-indigo-400 hover:bg-indigo-700 rounded-md text-sm font-medium transition-colors hidden sm:block">
                    Clear
                </button>
                <button onclick="downloadPDF()" class="flex items-center gap-2 px-4 py-2 bg-white text-indigo-600 hover:bg-gray-100 rounded-md text-sm font-bold shadow-sm transition-colors">
                    <i data-lucide="download" class="w-4 h-4"></i> Download PDF
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-hidden flex flex-col lg:flex-row max-w-full">
        
        <!-- LEFT PANEL: Editor Form -->
        <section class="w-full lg:w-1/2 p-4 lg:p-6 overflow-y-auto border-r border-gray-200 bg-white shadow-inner">
            <div class="max-w-2xl mx-auto space-y-8 pb-20">
                
                <!-- Personal Info Section -->
                <div>
                    <h2 class="text-lg font-semibold text-gray-900 border-b pb-2 mb-4 flex items-center gap-2">
                        <i data-lucide="user" class="w-5 h-5 text-indigo-500"></i> Personal Details
                    </h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                            <input type="text" id="input-name" oninput="updatePreview()" placeholder="Jane Doe" class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Job Title</label>
                            <input type="text" id="input-title" oninput="updatePreview()" placeholder="Senior Software Engineer" class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                            <input type="email" id="input-email" oninput="updatePreview()" placeholder="jane@example.com" class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
                            <input type="tel" id="input-phone" oninput="updatePreview()" placeholder="(555) 123-4567" class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Location</label>
                            <input type="text" id="input-location" oninput="updatePreview()" placeholder="San Francisco, CA" class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">LinkedIn / Website</label>
                            <input type="text" id="input-link" oninput="updatePreview()" placeholder="linkedin.com/in/janedoe" class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                        </div>
                    </div>
                </div>

                <!-- Professional Summary -->
                <div>
                    <h2 class="text-lg font-semibold text-gray-900 border-b pb-2 mb-4 flex items-center gap-2">
                        <i data-lucide="align-left" class="w-5 h-5 text-indigo-500"></i> Professional Summary
                    </h2>
                    <textarea id="input-summary" oninput="updatePreview()" rows="4" placeholder="Briefly describe your professional background and key strengths..." class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all resize-y"></textarea>
                </div>

                <!-- Work Experience Section -->
                <div>
                    <div class="flex justify-between items-center border-b pb-2 mb-4">
                        <h2 class="text-lg font-semibold text-gray-900 flex items-center gap-2">
                            <i data-lucide="briefcase" class="w-5 h-5 text-indigo-500"></i> Work Experience
                        </h2>
                        <button onclick="addExperience()" class="text-sm bg-indigo-50 text-indigo-600 hover:bg-indigo-100 px-3 py-1 rounded-md font-medium flex items-center gap-1 transition-colors">
                            <i data-lucide="plus" class="w-4 h-4"></i> Add
                        </button>
                    </div>
                    <div id="experience-container" class="space-y-6">
                        <!-- Experience items will be injected here -->
                    </div>
                </div>

                <!-- Education Section -->
                <div>
                    <div class="flex justify-between items-center border-b pb-2 mb-4">
                        <h2 class="text-lg font-semibold text-gray-900 flex items-center gap-2">
                            <i data-lucide="graduation-cap" class="w-5 h-5 text-indigo-500"></i> Education
                        </h2>
                        <button onclick="addEducation()" class="text-sm bg-indigo-50 text-indigo-600 hover:bg-indigo-100 px-3 py-1 rounded-md font-medium flex items-center gap-1 transition-colors">
                            <i data-lucide="plus" class="w-4 h-4"></i> Add
                        </button>
                    </div>
                    <div id="education-container" class="space-y-6">
                        <!-- Education items will be injected here -->
                    </div>
                </div>

                <!-- Skills Section -->
                <div>
                    <h2 class="text-lg font-semibold text-gray-900 border-b pb-2 mb-4 flex items-center gap-2">
                        <i data-lucide="wrench" class="w-5 h-5 text-indigo-500"></i> Skills
                    </h2>
                    <p class="text-xs text-gray-500 mb-2">Enter skills separated by commas (e.g., JavaScript, React, Project Management)</p>
                    <textarea id="input-skills" oninput="updatePreview()" rows="3" placeholder="JavaScript, HTML, CSS, Python..." class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all resize-y"></textarea>
                </div>

                <!-- Mobile Action Buttons -->
                <div class="flex gap-3 sm:hidden pt-4 border-t">
                     <button onclick="loadSampleData()" class="flex-1 py-2 bg-indigo-100 text-indigo-700 rounded-md text-sm font-medium">Sample</button>
                     <button onclick="clearForm()" class="flex-1 py-2 border border-gray-300 text-gray-700 rounded-md text-sm font-medium">Clear</button>
                </div>

            </div>
        </section>

        <!-- RIGHT PANEL: Live Preview -->
        <section class="w-full lg:w-1/2 bg-gray-200 p-4 lg:p-8 overflow-y-auto">
            <div class="sticky top-0 mb-4 flex justify-between items-center lg:hidden">
                <h3 class="font-semibold text-gray-700">Live Preview</h3>
            </div>
            
            <!-- The actual resume paper -->
            <div id="resume-preview-container" class="bg-white p-8 sm:p-10 md:p-12 text-gray-800">
                
                <!-- Header: Name & Contact -->
                <div class="border-b-2 border-gray-800 pb-6 mb-6">
                    <h1 id="preview-name" class="text-4xl font-bold text-gray-900 tracking-tight uppercase">Your Name</h1>
                    <h2 id="preview-title" class="text-xl text-indigo-600 mt-1 font-medium">Professional Title</h2>
                    
                    <div class="flex flex-wrap gap-x-4 gap-y-2 mt-4 text-sm text-gray-600">
                        <div id="preview-email-container" class="flex items-center gap-1 hidden">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                            <span id="preview-email"></span>
                        </div>
                        <div id="preview-phone-container" class="flex items-center gap-1 hidden">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                            <span id="preview-phone"></span>
                        </div>
                        <div id="preview-location-container" class="flex items-center gap-1 hidden">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                            <span id="preview-location"></span>
                        </div>
                        <div id="preview-link-container" class="flex items-center gap-1 hidden">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                            <span id="preview-link"></span>
                        </div>
                    </div>
                </div>

                <!-- Summary -->
                <div id="preview-summary-section" class="mb-6 hidden">
                    <p id="preview-summary" class="text-sm leading-relaxed text-gray-700"></p>
                </div>

                <!-- Two Column Layout for details -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    
                    <!-- Main Column (Experience & Education) -->
                    <div class="md:col-span-2 space-y-6">
                        <!-- Experience Section -->
                        <div id="preview-experience-section" class="hidden">
                            <h3 class="text-lg font-bold text-gray-900 border-b border-gray-300 pb-1 mb-3 uppercase tracking-wider">Experience</h3>
                            <div id="preview-experience-list" class="space-y-4">
                                <!-- Generated via JS -->
                            </div>
                        </div>

                        <!-- Education Section -->
                        <div id="preview-education-section" class="hidden">
                            <h3 class="text-lg font-bold text-gray-900 border-b border-gray-300 pb-1 mb-3 uppercase tracking-wider">Education</h3>
                            <div id="preview-education-list" class="space-y-4">
                                <!-- Generated via JS -->
                            </div>
                        </div>
                    </div>

                    <!-- Side Column (Skills) -->
                    <div class="md:col-span-1 space-y-6">
                        <!-- Skills Section -->
                        <div id="preview-skills-section" class="hidden">
                            <h3 class="text-lg font-bold text-gray-900 border-b border-gray-300 pb-1 mb-3 uppercase tracking-wider">Skills</h3>
                            <div id="preview-skills-list" class="flex flex-wrap gap-2">
                                <!-- Generated via JS -->
                            </div>
                        </div>
                    </div>

                </div>

            </div>
        </section>
    </main>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // State to hold dynamic lists
        let experiences = [];
        let educations = [];

        // Add a new empty experience block
        function addExperience() {
            const id = Date.now().toString();
            experiences.push({ id, role: '', company: '', date: '', description: '' });
            renderExperienceForms();
            updatePreview();
        }

        // Add a new empty education block
        function addEducation() {
            const id = Date.now().toString();
            educations.push({ id, degree: '', school: '', date: '' });
            renderEducationForms();
            updatePreview();
        }

        // Remove an item
        function removeExperience(id) {
            experiences = experiences.filter(exp => exp.id !== id);
            renderExperienceForms();
            updatePreview();
        }

        function removeEducation(id) {
            educations = educations.filter(edu => edu.id !== id);
            renderEducationForms();
            updatePreview();
        }

        // Render Experience Inputs
        function renderExperienceForms() {
            const container = document.getElementById('experience-container');
            container.innerHTML = '';

            experiences.forEach((exp, index) => {
                const div = document.createElement('div');
                div.className = 'p-4 border border-gray-200 rounded-lg bg-gray-50 relative group';
                div.innerHTML = `
                    <button onclick="removeExperience('${exp.id}')" class="absolute top-2 right-2 p-1 text-gray-400 hover:text-red-500 rounded transition-colors" title="Remove">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3 pr-6">
                        <div>
                            <input type="text" placeholder="Job Title" value="${exp.role}" oninput="updateExperience('${exp.id}', 'role', this.value)" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-indigo-500 outline-none">
                        </div>
                        <div>
                            <input type="text" placeholder="Company Name" value="${exp.company}" oninput="updateExperience('${exp.id}', 'company', this.value)" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-indigo-500 outline-none">
                        </div>
                        <div class="sm:col-span-2">
                            <input type="text" placeholder="Date Period (e.g. Jan 2020 - Present)" value="${exp.date}" oninput="updateExperience('${exp.id}', 'date', this.value)" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-indigo-500 outline-none">
                        </div>
                    </div>
                    <textarea placeholder="Describe your responsibilities and achievements..." rows="3" oninput="updateExperience('${exp.id}', 'description', this.value)" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-indigo-500 outline-none resize-y">${exp.description}</textarea>
                `;
                container.appendChild(div);
            });
            lucide.createIcons(); // Re-initialize icons for new elements
        }

        // Render Education Inputs
        function renderEducationForms() {
            const container = document.getElementById('education-container');
            container.innerHTML = '';

            educations.forEach((edu, index) => {
                const div = document.createElement('div');
                div.className = 'p-4 border border-gray-200 rounded-lg bg-gray-50 relative group';
                div.innerHTML = `
                    <button onclick="removeEducation('${edu.id}')" class="absolute top-2 right-2 p-1 text-gray-400 hover:text-red-500 rounded transition-colors" title="Remove">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3 pr-6">
                        <div>
                            <input type="text" placeholder="Degree" value="${edu.degree}" oninput="updateEducation('${edu.id}', 'degree', this.value)" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-indigo-500 outline-none">
                        </div>
                        <div>
                            <input type="text" placeholder="School Name" value="${edu.school}" oninput="updateEducation('${edu.id}', 'school', this.value)" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-indigo-500 outline-none">
                        </div>
                        <div class="sm:col-span-2">
                            <input type="text" placeholder="Date Period (e.g. Jan 2020 - Present)" value="${edu.date}" oninput="updateEducation('${edu.id}', 'date', this.value)" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-indigo-500 outline-none">
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
            lucide.createIcons(); // Re-initialize icons for new elements
        }
